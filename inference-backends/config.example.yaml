# Complete Inference Backends Configuration
# Supports 3 backends: HuggingFace API, vLLM, and llama.cpp

# Default backend preference: "auto", "huggingface", "vllm", or "llamacpp"
default_preference: auto

# Fallback order when backends fail
# Try vLLM first (fast), then llama.cpp (local), then HF API (reliable)
fallback_order:
  - vllm
  - llamacpp
  - huggingface

# Global timeout for all requests (milliseconds)
default_timeout_ms: 30000

# Enable periodic health checks
enable_health_checks: true

# Health check interval (seconds)
health_check_interval_secs: 60

# ============================================================================
# 1. HUGGINGFACE INFERENCE API (Cloud-based, Managed)
# ============================================================================
huggingface:
  enabled: true
  # API key (leave empty to use HF_API_KEY environment variable)
  api_key: null
  # HuggingFace API endpoint
  endpoint: https://api-inference.huggingface.co
  # Models to support
  models:
    - mistralai/Mistral-7B-Instruct-v0.2
    - meta-llama/Llama-2-7b-hf
    - NousResearch/Nous-Hermes-2-Mixtral-8x7B
  # Request timeout
  timeout_ms: 30000
  # Max concurrent requests
  max_concurrent_requests: 100
  # Enable response caching
  enable_cache: true
  # Cache TTL (seconds)
  cache_ttl_secs: 3600

# ============================================================================
# 2. VLLM CLUSTER (Self-hosted, Distributed, Fast)
# ============================================================================
vllm:
  enabled: true
  # vLLM endpoint URLs (can be multiple nodes)
  endpoints:
    - http://vllm-node-1:8000
    - http://vllm-node-2:8000
    - http://vllm-node-3:8000
  # Models to support
  models:
    - mistralai/Mistral-7B-Instruct-v0.2
    - meta-llama/Llama-2-7b-hf
  # Request timeout
  timeout_ms: 30000
  # Max concurrent requests per endpoint
  max_concurrent_requests: 1000
  # Load balancing: "round_robin", "least_loaded", or "random"
  load_balancing: least_loaded
  # Enable connection pooling
  enable_connection_pooling: true
  # Connection pool size per endpoint
  pool_size: 10

# ============================================================================
# 3. LLAMA.CPP (Local, Lightweight, CPU/GPU-friendly)
# ============================================================================
llamacpp:
  enabled: true
  # llama.cpp server endpoint (usually localhost:8080)
  endpoint: http://localhost:8080
  # Models to support (use model names/paths)
  models:
    - mistral-7b
    - llama2-7b
    - neural-chat
  # Request timeout
  timeout_ms: 30000
  # Max concurrent requests
  max_concurrent_requests: 50
  # Enable GPU acceleration (if available)
  gpu_enabled: true
  # Number of GPU layers to use (-1 = all, 0 = CPU only, 1-33 = partial)
  gpu_layers: 33
  # Number of CPU threads
  threads: 4
  # Context size (tokens)
  context_size: 4096
  # Batch size for processing
  batch_size: 512
