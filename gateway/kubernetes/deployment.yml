# AEGIS Gateway - Kubernetes Deployment Manifest
# Deploy with: kubectl apply -f deployment.yml

---
apiVersion: v1
kind: Namespace
metadata:
  name: aegis-gateway
  labels:
    name: aegis-gateway

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: aegis-gateway
data:
  GATEWAY_HOST: "0.0.0.0"
  GATEWAY_PORT: "8080"
  GATEWAY_LOG_LEVEL: "info"
  VLLM_ENDPOINTS: "http://vllm:8000"
  LLAMACPP_ENDPOINT: "http://llamacpp:8001"
  RATE_LIMIT_RPS: "100"
  CIRCUIT_BREAKER_THRESHOLD: "5"
  GATEWAY_CACHE_SIZE: "1000"
  GATEWAY_TIMEOUT: "30"

---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
  namespace: aegis-gateway
type: Opaque
stringData:
  JWT_SECRET: "your-secret-key-change-in-prod"
  DATABASE_URL: "postgres://user:password@postgres:5432/aegis"
  API_KEYS: "sk-test123,sk-prod456"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-gateway
  namespace: aegis-gateway
  labels:
    app: aegis-gateway
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aegis-gateway
  template:
    metadata:
      labels:
        app: aegis-gateway
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: aegis-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: gateway
        image: aegis-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: gateway-config
        - secretRef:
            name: gateway-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: cache
          mountPath: /tmp/aegis-cache
        - name: logs
          mountPath: /var/log/aegis
      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 1Gi
      - name: logs
        emptyDir:
          sizeLimit: 500Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - aegis-gateway
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: aegis-gateway
  namespace: aegis-gateway
  labels:
    app: aegis-gateway
spec:
  type: LoadBalancer
  selector:
    app: aegis-gateway
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  sessionAffinity: None

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegis-gateway-hpa
  namespace: aegis-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegis-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aegis-gateway-pdb
  namespace: aegis-gateway
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: aegis-gateway

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-gateway
  namespace: aegis-gateway

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aegis-gateway
  namespace: aegis-gateway
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegis-gateway
  namespace: aegis-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aegis-gateway
subjects:
- kind: ServiceAccount
  name: aegis-gateway
  namespace: aegis-gateway

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-gateway-netpol
  namespace: aegis-gateway
spec:
  podSelector:
    matchLabels:
      app: aegis-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: aegis-gateway
    ports:
    - protocol: TCP
      port: 8080
  - from:
    - namespaceSelector:
        matchLabels:
          name: aegis-monitoring
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: vllm
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - podSelector:
        matchLabels:
          app: llamacpp
    ports:
    - protocol: TCP
      port: 8001
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aegis-gateway
  namespace: aegis-gateway
spec:
  selector:
    matchLabels:
      app: aegis-gateway
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
